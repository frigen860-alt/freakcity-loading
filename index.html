<!DOCTYPE html>
<html lang="ru">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width,initial-scale=1.0">

    <title>Z-MUSORKA Loading</title>

    <link rel="stylesheet"
          href="style.css?v=2">

</head>

<body>

<!-- =======================================================
     BACKGROUND
======================================================== -->

<div id="background">

    <canvas id="grid-canvas"></canvas>

    <div id="background-gradient"></div>

    <div id="background-glow"></div>

    <div id="background-noise"></div>

    <div id="vignette"></div>

</div>

<!-- =======================================================
     HUGE BACKGROUND LETTER
======================================================== -->

<div id="background-logo">

    Z

</div>

<!-- =======================================================
     MUSIC PLAYER
======================================================== -->

<div id="music-widget">

    <div class="music-header">

        <div class="music-label">

            ♫ NOW PLAYING

        </div>

        <div id="playlist-count">

            1 / 3

        </div>

    </div>

    <div id="music-title">

        Unknown Track

    </div>

    <div id="music-author">

        Unknown Artist

    </div>

    <div class="music-progress">

        <div id="music-progress-fill"></div>

    </div>

    <div class="music-time">

        <span id="current-time">

            00:00

        </span>

        <span id="duration">

            00:00

        </span>

    </div>

    <div class="music-bottom">

        <div class="equalizer">

            <span></span>
            <span></span>
            <span></span>
            <span></span>
            <span></span>

        </div>

        <div class="music-controls">

            <button id="prev-track">⏮</button>

            <button id="play-track">▶</button>

            <button id="next-track">⏭</button>

        </div>

    </div>

</div>

<!-- =======================================================
     CENTER
======================================================== -->

<div id="center">

    <div id="logo-glow"></div>

    <div id="logo">

        <span class="logo-z">Z</span><span class="logo-rest">-MUSORKA</span>

    </div>

    <div id="subtitle">

        CONNECTING TO SERVER

    </div>

    <div id="server-info">

        <span id="server-name">

            Z-MUSORKA

        </span>

        <span class="dot">•</span>

        <span id="server-map">

            Loading...

        </span>

    </div>

</div>

<!-- =======================================================
     LOADING
======================================================== -->

<div id="loading">

    <div class="loading-top">

        <span id="loading-status">

            DOWNLOADING CONTENT

        </span>

        <span id="percent">

            0%

        </span>

    </div>

    <div class="loading-bar">

        <div id="progress-fill">

            <div id="progress-glow"></div>

        </div>

    </div>

</div>

<!-- =======================================================
     HUD
======================================================== -->

<div id="hud-left">

    <div>

        CLIENT READY

    </div>

    <div>

        HTML VERSION

    </div>

</div>

<div id="hud-right">

    <div id="loading-files">

        0 / 0 FILES

    </div>

    <div>

        WORKSHOP

    </div>

</div>

<!-- =======================================================
     AUDIO
======================================================== -->

<audio id="music"
       preload="auto"></audio>

<!-- =======================================================
     SCRIPT
======================================================== -->

<script src="script.js?v=2"></script>

</body>

</html>
