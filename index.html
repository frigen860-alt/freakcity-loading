<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Z-MUSORKA Loading</title>

    <link rel="stylesheet" href="style.css?v=5">
</head>
<body>

    <!-- Animated Background -->
    <div id="background">
    <canvas id="grid"></canvas>
    <div id="overlay"></div>
</div>
    
    <!-- Music -->
    <div id="music-widget">

        <div class="music-top">
            <span class="music-icon">♫</span>
            <span class="music-now">NOW PLAYING</span>
        </div>

        <div id="music-title">
            Unknown Track
        </div>

        <div id="music-author">
            Unknown Artist
        </div>

        <div class="equalizer">

            <span></span>
            <span></span>
            <span></span>
            <span></span>
            <span></span>

        </div>

    </div>

    <!-- Logo -->
    <div id="center">

        <div id="logo">
            Z-MUSORKA
        </div>

        <div id="subtitle">
            CONNECTING TO SERVER...
        </div>

    </div>

    <!-- Loading -->
    <div id="loading">

        <div class="loading-head">

            <span>LOADING</span>

            <span id="percent">
                0%
            </span>

        </div>

        <div class="loading-bar">

            <div id="progress-fill"></div>

        </div>

    </div>

<audio id="music" preload="auto"></audio>

    <script src="script.js?v=5"></script>

</body>
</html>
