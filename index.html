<!DOCTYPE html>
<html lang="ru">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">

    <title>Z-MUSORKA Loading</title>

    <link rel="stylesheet" href="style.css?v=1">

</head>

<body>

    <!-- Background -->

    <div id="background">

        <div id="grid"></div>

        <div id="overlay"></div>

    </div>

    <!-- Music Player -->

    <div id="music-widget">

        <div class="music-header">

            <div class="music-label">

                ♫ NOW PLAYING

            </div>

            <div id="playlist-count">

                1 / 1

            </div>

        </div>

        <div id="music-title">

            Unknown Track

        </div>

        <div id="music-author">

            Unknown Artist

        </div>

        <div class="music-progress">

            <div id="music-progress-fill"></div>

        </div>

        <div class="music-time">

            <span id="current-time">

                00:00

            </span>

            <span id="duration">

                00:00

            </span>

        </div>

        <div class="music-bottom">

            <div class="equalizer">

                <span></span>
                <span></span>
                <span></span>
                <span></span>
                <span></span>

            </div>

            <div class="music-controls">

                <button id="prev-track">⏮</button>

                <button id="play-track">▶</button>

                <button id="next-track">⏭</button>

            </div>

        </div>

    </div>

    <!-- Center -->

    <div id="center">

        <div id="logo">

            Z-MUSORKA

        </div>

        <div id="subtitle">

            CONNECTING TO SERVER...

        </div>

    </div>

    <!-- Loading -->

    <div id="loading">

        <div class="loading-top">

            <span id="loading-status">

                DOWNLOADING CONTENT

            </span>

            <span id="percent">

                0%

            </span>

        </div>

        <div class="loading-bar">

            <div id="progress-fill"></div>

        </div>

    </div>

    <audio id="music" preload="auto"></audio>

    <script src="script.js?v=1"></script>

</body>

</html>
